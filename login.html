<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KodNest Banking App</title>
    <meta name="description" content="Login to your KodNest Banking account securely.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <div class="brand">
                <div class="logo-icon">
                    <img src="assets/logo.png" alt="KodNest Logo">
                </div>
                <h1>KodNest Banking App</h1>
            </div>

            <div class="form-header">
                <h2 class="title">Welcome Back</h2>
                <p class="subtitle">Securely login to your account</p>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <input type="email" id="email" class="input-field" placeholder=" " required>
                    <label for="email" class="floating-label">Email Address</label>
                    <span class="error-msg">Please enter your email</span>
                </div>

                <div class="form-group password-group">
                    <input type="password" id="password" class="input-field" placeholder=" " required>
                    <label for="password" class="floating-label">Password</label>
                    <i class="fa-solid fa-eye-slash toggle-password" data-target="password"></i>
                    <span class="error-msg">Please enter your password</span>
                </div>

                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div class="switch-page">
                <p>Don't have an account? <a href="index.html">Register</a></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
